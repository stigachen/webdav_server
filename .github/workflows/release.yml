name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package="davbox-v${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/davbox" "dist/${package}/"
          cp README.md "dist/${package}/"
          cp docs/DESIGN.md "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"

      - name: Package Windows artifact
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $package = "davbox-v$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/davbox.exe" "dist/$package/"
          Copy-Item "README.md" "dist/$package/"
          Copy-Item "docs/DESIGN.md" "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip" -Force
          $hash = (Get-FileHash "dist/$package.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  dist/$package.zip" | Out-File -Encoding ascii "dist/$package.zip.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          generate_release_notes: true
